<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giles Web Design</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#0B0B0F;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
  background:rgba(15,15,20,0.6);
  backdrop-filter:blur(12px);
  z-index:1000;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* GRID OVERLAY */
.hero::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                   linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:0;
}

/* GLOW ORBS */
.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.5;
  animation:float 12s infinite alternate;
}

.orb1{
  width:400px;height:400px;
  background:#7B5CFF;
  top:-100px;left:-100px;
}

.orb2{
  width:300px;height:300px;
  background:#00C2FF;
  bottom:-100px;right:-100px;
  animation-delay:3s;
}

@keyframes float{
  from{transform:translateY(0px);}
  to{transform:translateY(60px);}
}

/* HERO CONTENT */
.hero-content{
  position:relative;
  z-index:2;
  animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

.hero h1{
  font-size:52px;
  max-width:800px;
  margin:auto;
}

.hero p{
  margin-top:20px;
  color:#aaa;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 32px;
  border-radius:40px;
  background:linear-gradient(45deg,#7B5CFF,#00C2FF);
  color:#fff;
  text-decoration:none;
  transition:0.3s;
  box-shadow:0 0 20px rgba(123,92,255,0.5);
}

.btn:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 0 40px rgba(123,92,255,0.8);
}

/* LIGHT SWEEP */
.light{
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:rotate(25deg);
  animation:sweep 6s infinite;
}

@keyframes sweep{
  from{transform:translateX(-100%) rotate(25deg);}
  to{transform:translateX(100%) rotate(25deg);}
}

/* SECTIONS */
.section{padding:120px 8%;text-align:center;}
.cards{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin-top:50px;}

.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  padding:35px;
  border-radius:20px;
  width:280px;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-12px);
  box-shadow:0 0 40px rgba(123,92,255,0.25);
}

.price{font-size:36px;margin:20px 0;color:#7B5CFF;}

/* MOBILE CTA */
.mobile-cta{
  position:fixed;
  bottom:0;
  width:100%;
  background:#7B5CFF;
  text-align:center;
  padding:15px;
}

.mobile-cta a{color:#fff;text-decoration:none;font-weight:600;}

</style>
</head>

<body>

<nav>
  <img src="logo.png" height="45">
</nav>

<!-- HERO -->
<section class="hero">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="light"></div>

  <div class="hero-content">
    <h1>Websites That Make Your Business Look Like a Big Deal</h1>
    <p>Designed to attract customers, build trust, and grow your business.</p>
    <a href="sms:2397884380" class="btn">Message Me</a>
  </div>
</section>

<!-- PRICING -->
<section class="section">
  <h2>Website Packages</h2>

  <div class="cards">
    <div class="card">
      <h3>Starter</h3>
      <div class="price">$100</div>
    </div>

    <div class="card" style="border:1px solid #7B5CFF;">
      <h3>Business Growth</h3>
      <div class="price">$250</div>
    </div>

    <div class="card">
      <h3>Premium</h3>
      <div class="price">$500</div>
    </div>
  </div>
</section>

<footer style="text-align:center;padding:30px;color:#777;">

</footer>

<div class="mobile-cta">
  <a href="sms:2397884380">Message Me Now</a>
</div>

</body>
</html>
